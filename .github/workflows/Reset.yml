name: Full Reset

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm deletion of all collected data'
        required: true
        type: string

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "Confirmation missing or incorrect. No changes made."
            exit 1
          fi

      - name: Delete collected data
        run: |
          rm -f collected.json subscription.txt
          rm -rf scans/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🧹 Full reset" && git push)
