name: Add Channels from Text or Last Post

on:
  workflow_dispatch:
    inputs:
      raw_text:
        description: 'Raw text containing channel usernames (with @, t.me/, etc.)'
        required: false
        type: string
      source_channel:
        description: 'Fetch last post of this channel and extract usernames from it'
        required: false
        type: string
      limit:
        description: 'Number of configs to extract from each added channel'
        required: false
        default: '10'
        type: number
      overwrite_existing:
        description: 'Update limit if channel already exists?'
        required: false
        default: false
        type: boolean

jobs:
  add-channels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RAW_TEXT: ${{ inputs.raw_text || '' }}
      SOURCE_CHANNEL: ${{ inputs.source_channel || '' }}
      LIMIT: ${{ inputs.limit || 10 }}
      OVERWRITE_EXISTING: ${{ inputs.overwrite_existing || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Extract usernames and update channels.json
        shell: python
        run: |
          import os, json, re, requests
          from bs4 import BeautifulSoup

          raw_text = os.environ.get('RAW_TEXT', '')
          source_channel = os.environ.get('SOURCE_CHANNEL', '')
          limit = int(os.environ['LIMIT'])
          overwrite = os.environ['OVERWRITE_EXISTING'].lower() == 'true'

          # ----- helper to fetch last post text -----
          def fetch_last_post_text(username):
              url = f"https://t.me/s/{username}"
              headers = {"User-Agent": "Mozilla/5.0"}
              print(f"[DEBUG] Fetching {url}")
              try:
                  resp = requests.get(url, headers=headers, timeout=15)
                  resp.raise_for_status()
                  soup = BeautifulSoup(resp.text, "html.parser")
                  msg = soup.select_one(".tgme_widget_message_wrap")
                  if msg:
                      text_div = msg.select_one(".tgme_widget_message_text")
                      if text_div:
                          txt = text_div.get_text(separator="\n")
                          print(f"[DEBUG] Last post text (first 300 chars): {txt[:300]}")
                          return txt
                  print("[DEBUG] No message found on page.")
                  return ""
              except Exception as e:
                  print(f"[ERROR] Could not fetch channel {username}: {e}")
                  return ""

          # ----- collect all text -----
          all_text = raw_text
          if source_channel:
              post_text = fetch_last_post_text(source_channel)
              if post_text:
                  all_text += "\n" + post_text
                  print(f"[INFO] Fetched last post from {source_channel}")
              else:
                  print(f"[WARN] No text retrieved from {source_channel}")

          if not all_text.strip():
              print("[ERROR] No input text at all.")
              exit(1)

          print(f"[DEBUG] Total combined text length: {len(all_text)}")

          # ----- robust username extraction -----
          candidates = set()

          # 1) classic regex (handles @, t.me/, - , _)
          pattern = r'(?:@|(?:https?://)?t\.me/|telegram\.me/|[_-])\s*([a-zA-Z][a-zA-Z0-9_]{4,31})'
          matches = re.findall(pattern, all_text)
          for m in matches:
              candidates.add(m.strip())

          # 2) plain valid usernames (word boundary)
          plain_pattern = r'\b([a-zA-Z][a-zA-Z0-9_]{4,31})\b'
          plain_matches = re.findall(plain_pattern, all_text)
          for m in plain_matches:
              candidates.add(m)

          # 3) fallback: line-by-line extraction
          # If a line starts with @, -, _ or even a word that looks like a username
          for line in all_text.splitlines():
              line = line.strip()
              # remove leading @ or - or _
              if line.startswith('@'):
                  line = line[1:]
              elif line.startswith('-') or line.startswith('_'):
                  line = line[1:]
              # also handle t.me/username in the line
              if 't.me/' in line:
                  # extract after t.me/
                  parts = line.split('t.me/')
                  for part in parts[1:]:
                      part = part.split()[0].split('#')[0].split('?')[0].rstrip('/')
                      if re.match(r'^[a-zA-Z][a-zA-Z0-9_]{4,31}$', part):
                          candidates.add(part)
              # now check if the remaining word is a valid username
              word = line.split()[0] if line else ''
              if re.match(r'^[a-zA-Z][a-zA-Z0-9_]{4,31}$', word):
                  candidates.add(word)

          # filter only valid usernames
          valid_usernames = {c for c in candidates if re.match(r'^[a-zA-Z][a-zA-Z0-9_]{4,31}$', c)}

          print(f"[DEBUG] Extracted candidates: {sorted(candidates)}")
          print(f"[DEBUG] Valid usernames after filtering: {sorted(valid_usernames)}")

          if not valid_usernames:
              print("[ERROR] No valid Telegram usernames found in the provided text.")
              exit(0)

          # ----- load existing channels.json -----
          channels_file = 'channels.json'
          if os.path.exists(channels_file):
              with open(channels_file, 'r', encoding='utf-8') as f:
                  channels = json.load(f)
          else:
              channels = []

          existing_map = {ch['username']: ch for ch in channels}
          added = updated = 0

          for username in valid_usernames:
              if username in existing_map:
                  if overwrite:
                      existing_map[username]['limit'] = limit
                      updated += 1
                      print(f"[INFO] Updated limit for {username} to {limit}")
                  else:
                      print(f"[INFO] Skipped {username} (already exists)")
              else:
                  channels.append({"username": username, "limit": limit})
                  existing_map[username] = True
                  added += 1
                  print(f"[INFO] Added {username} with limit {limit}")

          with open(channels_file, 'w', encoding='utf-8') as f:
              json.dump(channels, f, indent=2, ensure_ascii=False)

          print(f"[RESULT] {added} added, {updated} updated.")

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "➕ Add/update channels" && git push)
